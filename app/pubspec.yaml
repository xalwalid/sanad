name: sanad
description: Sanad — an anonymous, offline-first recovery companion. A Rakeeza product.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  gal: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# App icon — generated into the native folders by CI (dart run flutter_launcher_icons).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/sanad-logo.png"
  adaptive_icon_background: "#F3F0E8"
  adaptive_icon_foreground: "assets/brand/sanad-logo.png"

# Launch splash — cream background with the Sanad logo.
flutter_native_splash:
  color: "#F3F0E8"
  image: assets/brand/sanad-logo.png
  android_12:
    color: "#F3F0E8"
    image: assets/brand/sanad-logo.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/content/
    - assets/brand/

  # Offline-first: Cairo is bundled, so the app never needs the network for type.
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
