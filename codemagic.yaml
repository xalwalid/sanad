# Codemagic — cloud iOS build for Sanad (Flutter). No Mac needed.
# Mirrors the Tripoli Streets setup. Free tier (500 macOS min/mo) is plenty.
#
# One-time Codemagic setup (Team settings):
#   1. Add the Sanad repo (xalwalid/sanad).
#   2. App Store Connect integration (App Store Connect API key .p8 + Key ID +
#      Issuer ID). You already have one from Tripoli Streets — reuse the same
#      Apple account (Team L27Z2WV29H). Name the integration below.
#   3. Create the App record in App Store Connect with bundle id ly.com.sanad,
#      then put its numeric Apple ID into APP_STORE_APP_ID.
workflows:
  ios-release:
    name: Sanad iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    integrations:
      app_store_connect: tripoli-streets   # reuse the Tripoli Streets ASC API key (same Apple account, Team L27Z2WV29H)
    environment:
      # NOTE: no `ios_signing:` preflight block on purpose (its cache fails with
      # "No matching profiles"). We provision inline via fetch-signing-files below.
      groups:
        - ios-signing        # CERTIFICATE_PRIVATE_KEY = iOS Distribution cert (shared, from Tripoli Streets)
      flutter: 3.29.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "ly.com.sanad"
        APP_STORE_APP_ID: "6787402406"   # numeric Apple ID of the "Sanad - Recovery Companion" App Store Connect record
    scripts:
      - name: Flutter deps
        script: cd app && flutter pub get
      - name: Regenerate iOS native + patch Info.plist
        script: |
          cd app
          # Create BOTH native platforms: flutter_launcher_icons / flutter_native_splash
          # read the pubspec config for android+ios and crash if the android/ folder is
          # missing (exit 255). We still only build the IPA below.
          flutter create --platforms=ios,android --org ly.com --project-name sanad .
          bash ../scripts/patch-ios-plist.sh ios/Runner/Info.plist
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create
      - name: Set build number
        script: |
          cd app/ios
          agvtool new-version -all $(($BUILD_NUMBER))
      - name: Signing (register App ID + fetch/create App Store profile)
        script: |
          keychain initialize
          # Register the App ID if it doesn't exist yet (idempotent; we only ever touch OUR bundle id).
          app-store-connect bundle-ids register "$BUNDLE_ID" --name "Sanad" --platform IOS 2>/dev/null || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles   # also writes /Users/builder/export_options.plist used by the build step
      - name: Build IPA
        script: |
          cd app
          # Compile Flutter + install pods without signing.
          flutter build ios --release --no-codesign
          # Archive with MANUAL distribution signing (flutter build ipa uses automatic/
          # development signing and can't see the distribution cert — this is the we-speak fix).
          set -o pipefail
          ARCHIVE_PATH="/tmp/Runner.xcarchive"
          rm -rf "$ARCHIVE_PATH"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM=L27Z2WV29H \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive 2>&1 | tee /tmp/xcodebuild.log
          # Reference the exact provisioning profile the archive embedded.
          EMBED="$ARCHIVE_PATH/Products/Applications/Runner.app/embedded.mobileprovision"
          security cms -D -i "$EMBED" > /tmp/embedded-profile.plist 2>/dev/null
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/embedded-profile.plist 2>/dev/null || echo "")
          echo "Embedded profile: '$PROFILE_NAME'"
          mkdir -p build/ios/ipa
          cat > /tmp/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>L27Z2WV29H</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ly.com.sanad</key><string>$PROFILE_NAME</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates 2>&1 | tee /tmp/export.log
    artifacts:
      - app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
